<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/radio-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Всесвіт Радіо та ТБ — Universe Radio & TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <div class="logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="14" r="12" stroke="#3b82f6" stroke-width="2" fill="none"/>
              <circle cx="14" cy="14" r="4" fill="#3b82f6"/>
              <line x1="14" y1="2" x2="14" y2="8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
              <line x1="14" y1="20" x2="14" y2="26" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
              <line x1="2" y1="14" x2="8" y2="14" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
              <line x1="20" y1="14" x2="26" y2="14" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">Всесвіт</span>
          </div>
          <div class="mode-switcher">
            <button class="mode-btn active" data-mode="radio" title="Радіо">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 10v4M8 8v8M12 4v16M16 8v8M20 10v4"/></svg>
              <span>Радіо</span>
            </button>
            <button class="mode-btn" data-mode="tv" title="ТБ">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5-5-5"/></svg>
              <span>ТБ</span>
            </button>
          </div>
          <div class="header-playback">
            <button class="hdr-btn" id="hdrPrev" title="Попередня">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="hdr-btn hdr-play-btn" id="hdrPlay" title="Play / Stop">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <button class="hdr-btn" id="hdrNext" title="Наступна">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
          </div>
        </div>
        <div class="header-center">
          <div class="search-trigger" id="searchTrigger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <span>Пошук станцій...</span>
            <kbd class="kbd-shortcut">⌘K</kbd>
          </div>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="favoritesBtn" title="Обране">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
          <button class="icon-btn" id="timerBtn" title="Таймер сну">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Radio Mode -->
        <div class="radio-mode active" id="radioMode">
          <div class="radio-left">
            <div class="filters-bar">
              <div class="filter-group">
                <select class="filter-select" id="countryFilter">
                  <option value="">Всі країни</option>
                </select>
                <span class="filter-count" id="countryCount"></span>
              </div>
              <div class="filter-group">
                <select class="filter-select" id="genreFilter">
                  <option value="">Всі жанри</option>
                </select>
                <span class="filter-count" id="genreCount"></span>
              </div>
              <div class="filter-group">
                <select class="filter-select" id="sortFilter">
                  <option value="popular">Популярні</option>
                  <option value="bitrate">Бітрейт ↓</option>
                  <option value="name">Назва А-Я</option>
                </select>
              </div>
              <div class="filter-group">
                <label class="premium-toggle">
                  <input type="checkbox" id="premiumOnly" />
                  <span>★ Тільки преміум</span>
                </label>
              </div>
              <div class="station-total" id="stationTotal">0 станцій</div>
            </div>
            <div class="stations-grid" id="stationsGrid"></div>
          </div>
          <div class="radio-right" id="radioRight">
            <div class="radio-info-panel">
              <div class="radio-info-art" id="radioInfoArt">
                <div class="radio-info-art-fallback">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                </div>
              </div>
              <div class="radio-info-track-art" id="radioInfoTrackArt" style="display:none">
                <img id="radioInfoTrackArtImg" alt="" onerror="this.parentElement.style.display='none'">
              </div>
              <div class="radio-info-name" id="radioInfoName">Оберіть станцію</div>
              <div class="radio-info-now" id="radioInfoNow"><span class="rds-label">RDS</span><span class="rds-text"></span></div>
              <div class="radio-info-bitrate" id="radioInfoBitrate"></div>
              <div class="radio-info-meta" id="radioInfoMeta"></div>
            </div>
          </div>
        </div>

        <!-- TV Mode -->
        <div class="tv-mode" id="tvMode">
          <div class="tv-player-area">
            <video id="tvVideo" class="tv-video" playsinline></video>
            <div class="tv-overlay"></div>
            <div class="tv-guide" id="tvGuide">
              <div class="tv-guide-header">
                <h3>Плейлисти країн</h3>
                <span class="tv-guide-count" id="tvGuideCount">0 каналів</span>
              </div>
              <div class="tv-guide-list" id="tvGuideList"></div>
            </div>
            <div class="tv-signal-meter" id="tvSignalMeter">
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
            </div>
          </div>
        </div>

        </div>
      </main>

      <!-- Player Bar -->
      <div class="player-bar" id="playerBar">
        <div class="player-left">
          <div class="player-art" id="playerArt">
            <div class="art-fallback">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            </div>
          </div>
          <div class="player-info">
            <div class="player-name" id="playerName">Оберіть станцію</div>
            <div class="player-meta" id="playerMeta">---</div>
          </div>
        </div>
        <div class="player-right">
          <div class="player-volume">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
          </div>
          <button class="player-btn favorite-toggle" id="playerFavorite">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
          <div class="sleep-indicator" id="sleepIndicator" title="Таймер сну активний">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span id="sleepTimeLeft"></span>
          </div>
        </div>
      </div>

      <!-- Search Modal -->
      <div class="search-modal" id="searchModal">
        <div class="search-overlay" id="searchOverlay"></div>
        <div class="search-container">
          <div class="search-input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Пошук станцій, країн, жанрів..." autocomplete="off">
            <kbd class="kbd-shortcut small">ESC</kbd>
          </div>
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>

      <!-- Sleep Timer Modal -->
      <div class="timer-modal" id="timerModal">
        <div class="timer-overlay" id="timerOverlay"></div>
        <div class="timer-panel">
          <h3>Таймер сну</h3>
          <div class="timer-options">
            <button class="timer-option" data-min="15">15 хв</button>
            <button class="timer-option" data-min="30">30 хв</button>
            <button class="timer-option" data-min="45">45 хв</button>
            <button class="timer-option" data-min="60">60 хв</button>
          </div>
          <button class="timer-cancel" id="timerCancel">Скасувати таймер</button>
        </div>
      </div>

      <!-- Loading Screen -->
      <div class="loading-screen" id="loadingScreen">
        <div class="loading-globe">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="28" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.3"/>
            <circle cx="32" cy="32" r="28" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="20 160" class="loading-spin"/>
            <circle cx="32" cy="32" r="8" fill="#3b82f6" opacity="0.8"/>
          </svg>
        </div>
        <div class="loading-text">Завантаження станцій...</div>
        <div class="loading-progress">
          <div class="loading-bar" id="loadingBar"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
