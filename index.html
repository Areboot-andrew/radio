<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/radio-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texnoplus-radio - Hi-Fi Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  </head>
  <body>
    <div id="app" class="sonic-noir">
      
      <!-- Left Sidebar -->
      <aside class="sidebar-left">
        <div class="logo-area">
          <img src="/logo.svg" alt="Texnoplus-radio Logo" style="width: 100%; max-width: 220px; height: auto; display: block;" />
        </div>
        
        <nav class="main-nav">
          <button class="nav-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
          </button>
          <button class="nav-item active mode-btn" data-mode="radio">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><circle cx="12" cy="14" r="3"/><path d="M8 10h.01M16 10h.01"/></svg>
            Radio
          </button>
          <button class="nav-item mode-btn" data-mode="tv">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            Live TV
          </button>
          <button class="nav-item mode-btn" data-mode="podcasts">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
            Відеокліпи
          </button>
          <button class="nav-item" id="favoritesBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Favorites
          </button>
          <button class="nav-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            Library
          </button>
        </nav>
        
        <div class="user-profile" style="display: flex; flex-direction: column; align-items: flex-start; gap: 4px; padding: 16px; border-top: 1px solid var(--outline-variant); margin-top: auto;">
          <div class="stations-status">
           <div style="display:flex; justify-content:space-between; align-items:flex-end; gap: 20px;">
             <div>
               <span style="font-size:10px;text-transform:uppercase;color:var(--on-surface-variant);letter-spacing:1px">Всього станцій:</span>
               <h4 id="sidebarStationCount" style="margin:4px 0 0;font-size:16px;color:var(--primary-fixed)">0</h4>
             </div>
             <div style="text-align:right;">
               <span style="font-size:10px;text-transform:uppercase;color:var(--on-surface-variant);letter-spacing:1px">Потік:</span>
               <h4 id="realtimeBitrate" style="margin:4px 0 0;font-size:14px;color:#10b981;font-family:var(--font-mono)">0 kbps</h4>
             </div>
           </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Radio Mode -->
        <div class="radio-mode active" id="radioMode">
          <header class="content-header">
            <div style="display: flex; align-items: baseline; gap: 16px; margin-bottom: 1.5rem;">
               <h2 class="page-title" style="margin-bottom: 0;">Каталог Радіо</h2>
               <div id="stationTotal" style="font-family: var(--font-mono); font-size: 14px; color: var(--on-surface-variant);"></div>
            </div>
            
            <div class="chips-container">
              <select id="countryFilter" class="neo-select"></select>
              <select id="genreFilter" class="neo-select"></select>
              <select id="sortFilter" class="neo-select">
                 <option value="popular">Популярні</option>
                 <option value="name">За назвою</option>
                 <option value="bitrate">За якістю</option>
              </select>
              
              <label class="chip">
                 <input type="checkbox" id="premiumOnly" style="display:none">
                 <span style="display:flex; align-items:center; gap:6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
                    Hi-Res
                 </span>
              </label>
            </div>
            
            <div class="search-container-inline">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input type="text" class="search-input-inline" id="searchInput" placeholder="Пошук станцій...">
            </div>
          </header>
          
          <div class="list-header">
            <div class="col-station">СТАНЦІЯ</div>
            <div class="col-genre">ЖАНР</div>
            <div class="col-country">КРАЇНА</div>
            <div class="col-quality">ЯКІСТЬ</div>
            <div class="col-actions"></div>
          </div>
          
          <div class="stations-list" id="stationsGrid">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- TV & Clips Mode (Shared Video Player) -->
        <div class="tv-mode" id="tvMode" style="display:none; position:relative; flex-direction:column; align-items:center;">
           <video id="tvVideo" class="tv-video" playsinline webkit-playsinline></video>
           
           <!-- TV Controls and Meta -->
           <div class="tv-controls-bar" style="width:100%; display:flex; justify-content:space-between; align-items:center; background:var(--surface-container); padding:12px 24px; border-radius:12px; margin-top:16px;">
              <div class="tv-meta" style="flex:1;">
                 <h3 id="tvMetaTitle" style="margin:0; font-size:16px; color:var(--on-surface);">Оберіть відео</h3>
                 <p id="tvMetaSubtitle" style="margin:4px 0 0 0; font-size:13px; color:var(--on-surface-variant); display:none;"></p>
              </div>
              <div class="tv-actions" style="display:flex; gap:12px; align-items:center;">
                 <button class="ctrl-btn" id="tvPrev"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                 <button class="ctrl-btn play-btn" id="tvPlay" style="width:48px; height:48px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                 </button>
                 <button class="ctrl-btn" id="tvNext"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                 <button class="ctrl-btn" id="fullscreenBtn" title="На весь екран">
                   <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                 </button>
              </div>
           </div>
        </div>
      </main>

      <!-- Right Sidebar (Player & TV Guide) -->
      <aside class="sidebar-right player-panel">
        
        <!-- RADIO PLAYER -->
        <div id="playerBar" class="right-panel-content active-panel">
          <div class="player-top-bar">
            <div class="live-indicator">
              <div class="live-dot"></div> LIVE
            </div>
            <div class="player-badges">
               <span class="badge badge-outline">HI-RES</span>
               <span class="badge badge-outline" id="radioInfoBitrate">320 KBPS</span>
            </div>
          </div>
          
          <div class="player-art-large" id="radioInfoArt">
             <!-- Fallback -->
          </div>
          
          <div class="player-meta-large">
            <div class="track-title-row">
              <h3 class="track-name" id="radioInfoName">Оберіть станцію</h3>
              <button class="st-fav-btn player-fav" id="playerFavorite" title="Додати в обране">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
            </div>
            <p class="artist-name" id="radioInfoNow"><span class="rds-label" style="display:none"></span><span class="rds-text"></span></p>
            <p class="station-meta" id="radioInfoMeta"></p>
          </div>
          
          <div class="player-controls-container">
             <div class="player-status-row">
               <span class="status-left">Live</span>
               <span class="status-right"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M3 22v-8h4v8H3zm7 0V8h4v14h-4zm7 0V2h4v20h-4z"/></svg> Стабільний</span>
             </div>
             
             <div class="player-controls-main">
               <button class="ctrl-btn" id="hdrPrev"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
               <button class="ctrl-btn play-btn" id="hdrPlay">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
               </button>
               <button class="ctrl-btn" id="hdrNext"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
             </div>
             
             <div class="volume-container">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <input type="range" id="volumeSlider" min="0" max="100" value="70" class="volume-slider">
             </div>
          </div>
        </div>

        <!-- TV GUIDE -->
        <div id="tvGuidePanel" class="right-panel-content hidden-panel">
           <div class="tv-guide-header">
             <h3>Live TV Guide</h3>
             <span id="tvGuideCount">0 каналів</span>
           </div>
           <div class="tv-guide-filters" style="padding: 0 16px 16px 16px; display: flex; flex-direction: column; gap: 8px;">
             <input type="text" id="tvSearchInput" placeholder="Пошук каналу..." style="width:100%; padding:8px; border-radius:8px; background:var(--surface-container-high); border:none; color:var(--on-surface); outline:none;">
             <select id="tvCountryFilter" style="width:100%; padding:8px; border-radius:8px; background:var(--surface-container-high); border:none; color:var(--on-surface); outline:none;">
                <option value="">Всі країни</option>
             </select>
             <select id="tvCategoryFilter" style="width:100%; padding:8px; border-radius:8px; background:var(--surface-container-high); border:none; color:var(--on-surface); outline:none;">
                <option value="">Всі жанри</option>
             </select>
           </div>
           <div id="tvGuideList" class="tv-guide-list"></div>
        </div>
        
        <!-- CLIPS GUIDE -->
        <div id="clipsGuidePanel" class="right-panel-content hidden-panel">
           <div class="tv-guide-header">
             <h3>Відеокліпи та Кіно</h3>
             <span id="clipsCount">0 кліпів</span>
           </div>
           <div class="tv-guide-filters">
             <select id="clipsCategoryFilter" class="tv-select" style="width:100%; margin:8px 0; padding:8px; border-radius:8px; background:var(--surface-container-high); border:none; color:var(--on-surface);">
               <option value="all">Всі тематики</option>
             </select>
           </div>
           <div id="clipsGuideList" class="tv-guide-list"></div>
        </div>
        
        <!-- Hidden elements for JS compatibility -->
        <div style="display:none">
           <div id="radioInfoTrackArt"></div>
           <img id="radioInfoTrackArtImg">
           <div id="timerBtn"></div>
           <div id="sleepIndicator"></div>
           <span id="sleepTimeLeft"></span>
        </div>
      </aside>

      <!-- Mobile Player Toggle Button -->
      <button class="mobile-player-toggle" id="mobilePlayerToggle" aria-label="Відкрити плеєр">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </button>
      <!-- Mobile sidebar overlay -->
      <div class="sidebar-right-overlay" id="sidebarOverlay"></div>
      
      <!-- Modals -->
      <div class="timer-modal" id="timerModal" style="display:none;">
        <div class="timer-overlay" id="timerOverlay"></div>
        <div class="timer-panel">
          <button class="timer-cancel" id="timerCancel"></button>
        </div>
      </div>
      
      <!-- Loading Screen -->
      <div class="loading-screen" id="loadingScreen">
        <div class="loading-progress"><div class="loading-bar" id="loadingBar"></div></div>
      </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
