services:
  radio:
    build:
      context: .
      dockerfile: Dockerfile
    image: radio-player:latest
    container_name: radio-player
    restart: unless-stopped
    ports:
      - "${RADIO_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Read-only root with writable tmp for nginx pid + cache
    read_only: true
    tmpfs:
      - /tmp:size=32M
      - /var/cache/nginx:size=32M
      - /var/run:size=4M
    security_opt:
      - no-new-privileges:true
