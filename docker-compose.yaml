services:
  radio:
    build:
      context: .
      dockerfile: Dockerfile
    image: radio-player:latest
    container_name: radio-player
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    # Attach to Coolify's network so Traefik can reach this container
    networks:
      - coolify
    # Coolify's Docker Compose mode does NOT auto-inject Traefik labels
    # (unlike Dockerfile deploys). Add them by hand so Traefik routes
    # the domain to this container.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.services.radio.loadbalancer.server.port=80"
      - "traefik.http.routers.radio.rule=Host(`radio.texno.plus`)"
      - "traefik.http.routers.radio.entrypoints=https"
      - "traefik.http.routers.radio.tls=true"
      - "traefik.http.routers.radio.tls.certresolver=letsencrypt"

networks:
  coolify:
    external: true
    name: coolify

