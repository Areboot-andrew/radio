services:
  radio:
    build:
      context: .
      dockerfile: Dockerfile
    image: radio-player:latest
    container_name: radio-player
    restart: unless-stopped
    # Coolify's Traefik reaches the container via Docker network — no
    # host port binding required. App listens on internal :8080.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
