# Radio player SPA — Vite build
server {
    listen 8080 default_server;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml;

    # Cache static assets (hashed by Vite → 1y safe)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # HTML — always revalidate (cheap, no fingerprint)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # HLS chunks (.ts / .m3u8) — short cache
    location ~* \.(m3u8|ts|m4s)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA fallback — every unknown path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide hidden files (.env, .git, etc.)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
